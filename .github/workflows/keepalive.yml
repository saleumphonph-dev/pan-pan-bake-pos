name: Supabase Keep-Alive

# Free-tier Supabase projects auto-pause after ~7 days of inactivity, which
# silently breaks cross-device sync (the hostname stops resolving). This pings
# the database on a schedule so the project never goes idle.

on:
  schedule:
    # Runs EVERY DAY (02:17 UTC). Twice a week was too close to the ~7-day
    # auto-pause window — a single skipped GitHub-cron run could let it pause.
    # Daily leaves a large safety margin.
    - cron: "17 2 * * *"
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "$SUPABASE_URL/rest/v1/sales?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "Supabase responded with HTTP $code"
          if [ "$code" = "200" ] || [ "$code" = "206" ]; then
            echo "✅ Keep-alive OK — project is active."
          else
            echo "❌ Keep-alive failed (HTTP $code) — project may be paused or down."
            exit 1
          fi
